name: PSM Alert Engine

on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  run-safety-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to save the history files

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alert Engine
        env:
          SAFETY_RSS_URL_1: ${{ secrets.SAFETY_RSS_URL_1 }}
          SAFETY_RSS_URL_2: ${{ secrets.SAFETY_RSS_URL_2 }}
          SAFETY_RSS_URL_3: ${{ secrets.SAFETY_RSS_URL_3 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
        run: python alert_engine.py

      - name: Save History Logs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_urls.txt processed_titles.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update history logs to prevent duplicate emails" && git push)
