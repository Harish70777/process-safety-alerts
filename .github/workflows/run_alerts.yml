name: PSM Alert Engine
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: 

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run: pip install -r requirements.txt
    - env:
        SAFETY_RSS_URL_1: ${{ secrets.SAFETY_RSS_URL_1 }}
        SAFETY_RSS_URL_2: ${{ secrets.SAFETY_RSS_URL_2 }}
        SAFETY_RSS_URL_3: ${{ secrets.SAFETY_RSS_URL_3 }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python alert_engine.py
    - run: |
        git config --global user.name "Safety Bot"
        git config --global user.email "bot@github.internal"
        git add processed_urls.txt processed_titles.txt psm_alerts.ics || true
        git diff-index --quiet HEAD || git commit -m "Update calendar [skip ci]"
        git push
